  <!-- =====================================================================
         TAG DATA + RENDERING
         Add a new tag: add one string to the right category's `tags` array.
         Add a new category: add one object to CATEGORIES (id must match the
         key used in tags.js's `linksContainers` / `subcategoryToCategoryMap`).
         This script is intentionally NOT deferred: it must run synchronously
         during page parse so the .tag-button elements exist in the DOM
         before tags.js's DOMContentLoaded handler queries for them.
         ===================================================================== -->
  <script>
      (function () {
        const CATEGORIES = [
          {
            id: "linear-algebra", name: "Linear Algebra", tags: [
              "Linear Algebra", "Row Reduction", "Subspaces", "Linear Independence", "Eigenvalues",
              "Eigenvectors", "Linear Transformation", "Basis", "Characteristic Polynomial",
              "Minimal Polynomial", "Inner Product Space", "Dimension"
            ]
          },
          {
            id: "real-analysis", name: "Real Analysis", tags: [
              "Real Analysis", "Real Numbers", "Supremum", "Sequences", "Continuity", "Derivatives",
              "Integral", "Improper Integral", "Partial Derivative", "Multivariable",
              "Inverse Function Theorem", "Sequence of Functions"
            ]
          },
          {
            id: "complex-analysis", name: "Complex Analysis", tags: [
              "Complex Analysis", "Infinite Series", "Complex Differentiation", "Complex Integration",
              "Analytic Function", "Singularity", "Harmonic Conjugate", "Mobius Transformation",
              "Residue Theorem"
            ]
          },
          {
            id: "abstract-algebra", name: "Abstract Algebra", tags: [
              "Abstract Algebra", "Group Theory", "Subgroups", "Sylow Theorem", "Cyclic Group",
              "Group Action", "Ring Theory", "Field Theory", "Splitting Field", "Group Homomorphism"
            ]
          },
          {
            id: "topology", name: "Topology", tags: [
              "Topology", "Metric Space", "Open Set", "Product Topology", "Hausdorff Space",
              "Homeomorphism", "Connectedness", "Subspace Topology", "Separation", "Completeness",
              "Homotopy-theory"
            ]
          },
          {
            id: "differential-equation", name: "Differential Equation", tags: [
              "Differential Equation", "ODE", "PDE", "Characteristics", "Heat Equation",
              "Laplace Transformation", "Charpit Method"
            ]
          },
          {
            id: "miscellaneous", name: "Miscellaneous", tags: [
              "Miscellaneous", "Probability Theory", "Statistics", "Normal distribution",
              "Numerical Analysis", "Numerical Integration", "Lagrange Multiplier",
              "Linear Programming", "Functional Analysis", "Number Theory", "Calculus",
              "Differential Geometry", "Combinatorics", "Set Theory", "Mappings"
            ]
          },
          {
            id: "gate", name: "GATE", tags: [
              "GATE 2024", "GATE 2023", "GATE 2022", "GATE 2021", "GATE 2019", "GATE 2007", "GATE 2006"
            ]
          },
          {
            id: "csir-net", name: "CSIR-NET", tags: [
              "CSIR-NET June 2011", "CSIR-NET Dec 2019", "CSIR-NET Feb 2022"
            ]
          },
          {
            id: "nbhm", name: "NBHM", tags: [
              "NBHM MSc 2019", "NBHM PhD 2005", "NBHM PhD 2006", "NBHM PhD 2007", "NBHM PhD 2017"
            ]
          },
          { id: "mcq", name: "MCQ", tags: ["MCQ"] },
          {
            id: "book-solution", name: "Book Solutions", tags: [
              "Topology Munkres", "Linear Algebra Hoffman Kunze", "Real Analysis Rudin",
              "Real Analysis Bartle Sherbert", "Abstract Algebra Herstein", "Complex Analysis Gamelin",
              "Complex Variables Brown and Churchill"
            ]
          }
        ];

        // Exact class tags.js expects on an inactive tag button — do not change
        // without also updating the matching string inside tags.js.
        const TAG_BUTTON_CLASS =
          "tag-button text-gray-900 bg-gradient-to-r from-lime-200 via-lime-400 to-lime-500 " +
          "hover:bg-gradient-to-br font-medium rounded-lg text-base px-5 py-2.5 text-center me-2 mb-2";

        const root = document.getElementById("tag-categories");
        const frag = document.createDocumentFragment();

        CATEGORIES.forEach(function (cat, i) {
          const section = document.createElement("div");
          section.className = "category-section";
          section.dataset.categoryId = cat.id;

          const header = document.createElement("button");
          header.type = "button";
          header.className =
            "category-toggle w-full flex items-center justify-between gap-3 py-3 px-1 " +
            "text-left group";
          header.innerHTML =
            '<span class="flex items-baseline gap-2">' +
            '<span class="text-lg font-semibold text-gray-800">' + cat.name + '</span>' +
            '<span class="text-xs font-medium text-gray-400 bg-gray-100 rounded-full px-2 py-0.5">' + cat.tags.length + '</span>' +
            '</span>' +
            '<svg class="chevron h-5 w-5 text-gray-400 transition-transform duration-200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

          const body = document.createElement("div");
          body.className = "category-body"; // collapsed by default via inline style below
          body.style.display = "none";

          const buttonGrid = document.createElement("div");
          buttonGrid.id = cat.id + "-buttons";
          buttonGrid.className = "grid grid-cols-2 xs:grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-4 xl:grid-cols-4 2xl:grid-cols-6 gap-4 my-4";

          cat.tags.forEach(function (tagName) {
            const wrap = document.createElement("div");
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = TAG_BUTTON_CLASS;
            btn.textContent = tagName;
            wrap.appendChild(btn);
            buttonGrid.appendChild(wrap);
          });

          const linksDiv = document.createElement("div");
          linksDiv.id = cat.id + "-links";

          body.appendChild(buttonGrid);
          body.appendChild(linksDiv);

          section.appendChild(header);
          section.appendChild(body);

          if (i < CATEGORIES.length - 1) {
            const hr = document.createElement("hr");
            hr.className = "h-px my-2 bg-gray-200 border-0 mx-auto";
            section.appendChild(hr);
          }

          frag.appendChild(section);

          header.addEventListener("click", function () {
            const isOpen = body.style.display !== "none";
            body.style.display = isOpen ? "none" : "block";
            header.querySelector(".chevron").style.transform = isOpen ? "" : "rotate(180deg)";
          });
        });

        root.appendChild(frag);

        // ---- search -------------------------------------------------------
        const searchInput = document.getElementById("tag-search");
        const clearBtn = document.getElementById("clear-search");
        const resultCount = document.getElementById("result-count");
        const noResults = document.getElementById("no-results");

        function openSection(section) {
          const body = section.querySelector(".category-body");
          const chevron = section.querySelector(".chevron");
          body.style.display = "block";
          chevron.style.transform = "rotate(180deg)";
        }
        function closeSection(section) {
          const body = section.querySelector(".category-body");
          const chevron = section.querySelector(".chevron");
          body.style.display = "none";
          chevron.style.transform = "";
        }

        function runSearch() {
          const q = searchInput.value.trim().toLowerCase();
          clearBtn.classList.toggle("hidden", q.length === 0);

          let total = 0;
          document.querySelectorAll(".category-section").forEach(function (section) {
            const buttons = section.querySelectorAll(".tag-button");
            let matches = 0;
            buttons.forEach(function (btn) {
              const match = !q || btn.textContent.toLowerCase().includes(q);
              btn.parentElement.classList.toggle("hidden", !match);
              if (match) matches++;
            });
            total += matches;
            section.classList.toggle("hidden", matches === 0);
            if (q) {
              if (matches > 0) openSection(section); else closeSection(section);
            }
          });

          resultCount.textContent = q ? total + " tag" + (total !== 1 ? "s" : "") + " found" : "";
          noResults.classList.toggle("hidden", !(q && total === 0));
        }

        searchInput.addEventListener("input", runSearch);
        clearBtn.addEventListener("click", function () {
          searchInput.value = "";
          runSearch();
          searchInput.focus();
        });

        document.getElementById("expand-all").addEventListener("click", function () {
          document.querySelectorAll(".category-section").forEach(openSection);
        });
        document.getElementById("collapse-all").addEventListener("click", function () {
          document.querySelectorAll(".category-section").forEach(closeSection);
        });

        // Keep the ?tag= deep link working: open the category that contains
        // the requested tag before tags.js's own DOMContentLoaded logic clicks it.
        const tagFromUrl = new URLSearchParams(window.location.search).get("tag");
        if (tagFromUrl) {
          document.querySelectorAll(".tag-button").forEach(function (btn) {
            const slug = btn.textContent.trim().toLowerCase().replace(/ /g, "-");
            if (slug === tagFromUrl) {
              openSection(btn.closest(".category-section"));
            }
          });
        }
      })();
  </script>

  <script src="tags.js"></script>
