  <!-- =====================================================================
         TAG RENDERING — fully data-driven.
         Reads tagsToProblems (auto-generated by generate-tags.js) and
         tag-categories.js (the tag -> category map). Adding a tag to
         tagsToProblems.js and mapping it in tag-categories.js is now the
         ONLY thing needed for a tag to appear here — nothing in this file
         needs to change.

         Not deferred: must run synchronously during parse so the
         .tag-button elements exist before tags.js's DOMContentLoaded
         handler queries for them.
         ===================================================================== -->
  <script>
      (function () {
        const TAG_BUTTON_CLASS =
          "tag-button inline-flex items-center gap-1.5 bg-white border border-gray-200 text-gray-600 " +
          "hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-700 font-medium rounded-full text-sm px-4 py-2 transition-colors " +
          "focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400 focus-visible:ring-offset-1";

        // ---- 1. Fold aliases/case-dupes into canonical tags --------------
        const canonical = {}; // canonicalSlug -> Set of entries
        const seenIssues = [];

        Object.keys(tagsToProblems).forEach(rawKey => {
          const lower = rawKey.toLowerCase();
          const key = (typeof TAG_ALIASES !== 'undefined' && TAG_ALIASES[lower]) || lower;

          if (key !== rawKey) {
            seenIssues.push(`"${rawKey}" folded into "${key}"`);
          }

          if (!canonical[key]) canonical[key] = new Set();
          tagsToProblems[rawKey].forEach(entry => canonical[key].add(entry));
        });

        // ---- 2. Group canonical tags into categories ----------------------
        const buckets = {}; // categoryId -> [{slug, entries}]
        CATEGORY_ORDER.forEach(id => { buckets[id] = []; });

        Object.keys(canonical).sort().forEach(slug => {
          const catId = resolveCategory(slug);
          if (!buckets[catId]) buckets[catId] = []; // safety net
          const entries = Array.from(canonical[slug]);
          buckets[catId].push({ slug, entries });
          if (catId === 'uncategorized') {
            seenIssues.push(`"${slug}" has no category in tag-categories.js — showing under Uncategorized`);
          }
        });

        // Pin each category's "main" tag (slug identical to the category id
        // itself — e.g. the 'linear-algebra' tag inside Linear Algebra, which
        // carries every problem posted that day of week) first in its grid,
        // and relabel it so it doesn't read like just another topic tag.
        Object.keys(buckets).forEach(catId => {
          const list = buckets[catId];
          const mainIdx = list.findIndex(t => t.slug === catId);
          if (mainIdx > 0) {
            const [mainTag] = list.splice(mainIdx, 1);
            mainTag.isMain = true;
            list.unshift(mainTag);
          } else if (mainIdx === 0) {
            list[0].isMain = true;
          }
        });

        if (seenIssues.length) {
          console.warn('Tags page data notes:\n- ' + seenIssues.join('\n- '));
        }

        // ---- 3. Render category sections -----------------------------------
        const root = document.getElementById('tag-categories');
        const frag = document.createDocumentFragment();
        const orderedCatIds = CATEGORY_ORDER.filter(id => buckets[id] && buckets[id].length > 0);

        // Shared open/close helpers — animate via max-height (measured from
        // actual content) rather than display:none/block, and track state in
        // a data attribute so header clicks, search, and the jump nav all
        // agree on what's open.
        function openSection(section) {
          const body = section.querySelector('.category-body');
          const chevron = section.querySelector('.chevron');
          section.dataset.open = 'true';
          body.style.maxHeight = body.scrollHeight + 'px';
          chevron.style.transform = 'rotate(180deg)';
        }
        function closeSection(section) {
          const body = section.querySelector('.category-body');
          const chevron = section.querySelector('.chevron');
          section.dataset.open = 'false';
          body.style.maxHeight = '0px';
          chevron.style.transform = '';
        }

        orderedCatIds.forEach((catId, i) => {
          const tags = buckets[catId];
          const section = document.createElement('div');
          section.className = 'category-section bg-white border border-gray-200 rounded-xl shadow-sm mb-3';
          section.dataset.categoryId = catId;
          section.dataset.open = 'false';

          const header = document.createElement('button');
          header.type = 'button';
          header.className = 'category-toggle w-full flex items-center justify-between gap-3 py-4 px-5 text-left hover:bg-gray-50 rounded-xl transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400 focus-visible:ring-offset-1';
          header.innerHTML =
            '<span class="flex items-baseline gap-2">' +
            '<span class="text-base font-semibold text-gray-800">' + (CATEGORY_NAMES[catId] || catId) + '</span>' +
            '<span class="text-xs font-medium text-gray-400">' + tags.length + '</span>' +
            '</span>' +
            '<svg class="chevron h-4 w-4 text-gray-400 transition-transform duration-200 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

          const body = document.createElement('div');
          body.className = 'category-body border-t border-gray-100';
          body.style.overflow = 'hidden';
          body.style.maxHeight = '0px';
          body.style.transition = 'max-height 0.25s ease';

          const buttonGrid = document.createElement('div');
          buttonGrid.id = catId + '-buttons';
          buttonGrid.className = 'flex flex-wrap gap-2 px-5 py-4';

          tags.forEach(({ slug, entries, isMain }) => {
            const label = isMain ? 'All problems' : ((typeof slugToLabel === 'function') ? slugToLabel(slug) : slug);

            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = TAG_BUTTON_CLASS;
            btn.dataset.tag = slug; // canonical slug — tags.js reads this, not innerText
            btn.dataset.label = label; // original label, used to rebuild after search highlighting

            const labelSpan = document.createElement('span');
            labelSpan.className = 'tag-label';
            labelSpan.textContent = label;

            const badge = document.createElement('span');
            badge.className = 'text-xs text-gray-400';
            badge.textContent = entries.length;

            btn.appendChild(labelSpan);
            btn.appendChild(badge);
            buttonGrid.appendChild(btn);
          });

          const linksDiv = document.createElement('div');
          linksDiv.id = catId + '-links';
          linksDiv.classList.add('hidden');

          body.appendChild(buttonGrid);
          body.appendChild(linksDiv);
          section.appendChild(header);
          section.appendChild(body);

          frag.appendChild(section);

          header.addEventListener('click', function () {
            if (section.dataset.open === 'true') closeSection(section); else openSection(section);
          });
        });

        root.appendChild(frag);

        // ---- 3b. Jump-to-category nav ---------------------------------------
        // Only the core subject categories — exam tags, MCQ, and book
        // solutions are left out to keep this row short and scannable.
        const JUMP_NAV_CATEGORIES = [
          'linear-algebra', 'real-analysis', 'complex-analysis',
          'abstract-algebra', 'topology', 'differential-equation'
        ];
        const jumpCatIds = JUMP_NAV_CATEGORIES.filter(id => orderedCatIds.includes(id));

        if (jumpCatIds.length) {
          const jumpNav = document.getElementById('jump-nav');
          const jumpNavInner = jumpNav.querySelector('div');
          jumpNav.classList.remove('hidden');

          jumpCatIds.forEach(catId => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'bg-white border border-gray-200 text-gray-600 hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-700 font-medium rounded-full text-xs px-3 py-1.5 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-400 focus-visible:ring-offset-1';
            btn.textContent = CATEGORY_NAMES[catId] || catId;
            btn.addEventListener('click', function () {
              const section = document.querySelector('.category-section[data-category-id="' + catId + '"]');
              if (!section) return;
              openSection(section);
              section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
            jumpNavInner.appendChild(btn);
          });
        }

        // ---- 4. Search ---------------------------------------------------
        const searchInput = document.getElementById('tag-search');
        const clearBtn = document.getElementById('clear-search');
        const resultCount = document.getElementById('result-count');
        const noResults = document.getElementById('no-results');

        function escapeHtml(s) {
          return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function highlightLabel(label, q) {
          if (!q) return escapeHtml(label);
          const idx = label.toLowerCase().indexOf(q);
          if (idx === -1) return escapeHtml(label);
          const before = label.slice(0, idx);
          const match = label.slice(idx, idx + q.length);
          const after = label.slice(idx + q.length);
          return escapeHtml(before) +
            '<mark class="bg-indigo-100 text-indigo-700 rounded-sm px-0.5">' + escapeHtml(match) + '</mark>' +
            escapeHtml(after);
        }

        function runSearch() {
          const q = searchInput.value.trim().toLowerCase();
          clearBtn.classList.toggle('hidden', q.length === 0);

          let total = 0;
          document.querySelectorAll('.category-section').forEach(function (section) {
            const tagButtons = section.querySelectorAll('.tag-button');
            let matches = 0;
            tagButtons.forEach(function (btn) {
              const label = btn.dataset.label || btn.textContent;
              const match = !q || label.toLowerCase().includes(q);
              btn.style.display = match ? '' : 'none';
              if (match) matches++;

              const labelSpan = btn.querySelector('.tag-label');
              if (labelSpan) labelSpan.innerHTML = highlightLabel(label, q);
            });
            total += matches;
            section.classList.toggle('hidden', matches === 0);
            if (q) {
              if (matches > 0) openSection(section); else closeSection(section);
            }
          });

          resultCount.textContent = q ? total + ' tag' + (total !== 1 ? 's' : '') + ' found' : '';
          noResults.classList.toggle('hidden', !(q && total === 0));
        }

        searchInput.addEventListener('input', runSearch);
        clearBtn.addEventListener('click', function () {
          searchInput.value = '';
          runSearch();
          searchInput.focus();
        });

        document.getElementById('expand-all').addEventListener('click', function () {
          document.querySelectorAll('.category-section').forEach(openSection);
        });
        document.getElementById('collapse-all').addEventListener('click', function () {
          document.querySelectorAll('.category-section').forEach(closeSection);
        });

        document.addEventListener('keydown', function (e) {
          if (e.key === '/' && document.activeElement !== searchInput) {
            e.preventDefault();
            searchInput.focus();
          }
        });

        searchInput.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && searchInput.value) {
            e.preventDefault();
            searchInput.value = '';
            runSearch();
          }
        });

        // Exposed so tags.js can force-expand + re-measure the owning
        // category section right after it renders a tag's content. This is
        // the ONLY place this happens now — covers real clicks, the initial
        // ?tag= deep link, and browser back/forward uniformly, since only a
        // real click reliably bubbles a DOM event; the other two don't.
        window.expandCategoryForTag = function (tag) {
          const catId = resolveCategory(tag);
          const section = document.querySelector('.category-section[data-category-id="' + catId + '"]');
          if (section) openSection(section);
        };
      })();
  </script>

  <script src="tags.js"></script>
</body>
