<html lang="en">
<head>
    <meta charset="UTF-8" />

    <title>Problem Status Tracker</title>

<body class="bg-white text-gray-900">
    <div class="max-w-2xl mx-auto px-6 py-10">

        <h1 class="text-2xl font-semibold mb-1">Problem Status Tracker</h1>
        <p class="text-sm text-gray-500 mb-6">Checks each date against the JSON data files. Green = problem added. Red =
            not added yet. Topic is read from the JSON when solved, otherwise inferred from the day of week (matching
            your weekly rotation).</p>

        <div id="summary" class="flex gap-4 mb-6 text-sm"></div>

        <div class="flex flex-wrap gap-3 mb-4">
            <select id="filter" class="border border-gray-300 rounded px-3 py-1.5 text-sm">
                <option value="all">Show all</option>
                <option value="unsolved">Unsolved only</option>
                <option value="solved">Solved only</option>
            </select>
            <select id="month-filter" class="border border-gray-300 rounded px-3 py-1.5 text-sm">
                <option value="all">All months</option>
            </select>
            <select id="topic-filter" class="border border-gray-300 rounded px-3 py-1.5 text-sm">
                <option value="all">All topics</option>
            </select>
        </div>

        <table class="w-full text-sm border-collapse">
            <thead>
                <tr class="border-b border-gray-300 text-left text-gray-500">
                    <th class="py-2 pr-4">Date</th>
                    <th class="py-2 pr-4">Topic</th>
                    <th class="py-2">Status</th>
                </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>

    </div>

        ];

        // Day-of-week -> topic, matching problem-loader.js's topicMap (0 = Sunday)
        const WEEKDAY_TOPIC = {
            0: 'linear-algebra', 1: 'real-analysis', 2: 'complex-analysis',
            3: 'abstract-algebra', 4: 'topology', 5: 'differential-equations', 6: 'miscellaneous'
        };
        const TOPIC_LABELS = {
            'linear-algebra': 'Linear Algebra', 'real-analysis': 'Real Analysis', 'complex-analysis': 'Complex Analysis',
            'abstract-algebra': 'Abstract Algebra', 'topology': 'Topology', 'differential-equations': 'Differential Equations',
            'miscellaneous': 'Miscellaneous'
        };

        function expectedTopicFor(dateStr) {
            const [y, m, d] = dateStr.split('-').map(Number);
            const dayOfWeek = new Date(y, m - 1, d).getDay();
            return WEEKDAY_TOPIC[dayOfWeek];
        }

        let solvedSet = new Set();       // dates found in any JSON
        let actualTopicByDate = {};      // date -> topic file it was actually found in (when solved)
        let filterMode = 'all';
        let monthFilter = 'all';
        let topicFilter = 'all';

        async function loadData() {
            const results = await Promise.all(TOPIC_FILES.map(async topic => {
                try {
                    const res = await fetch(`${DATA_PATH}${topic}.json`, { cache: 'no-store' });
                    if (!res.ok) return [];
                    const json = await res.json();
                    return (json.problems || []).map(p => ({ date: p.date, topic }));
                } catch (e) {
                    console.error(`Failed to load ${topic}.json`, e);
                    return [];
                }
            }));
            results.flat().forEach(({ date, topic }) => {
                solvedSet.add(date);
                actualTopicByDate[date] = topic;
            });
            populateFilters();
            render();
        }

        function topicFor(dateStr) {
            return actualTopicByDate[dateStr] || expectedTopicFor(dateStr);
        }

        function populateFilters() {
            const months = [...new Set(TRACKED_DATES.map(d => d.slice(0, 7)))].sort();
            const monthSelect = document.getElementById('month-filter');
            months.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                monthSelect.appendChild(opt);
            });

            const topicSelect = document.getElementById('topic-filter');
            TOPIC_FILES.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = TOPIC_LABELS[t];
                topicSelect.appendChild(opt);
            });
        }

        function render() {
            const solvedCount = TRACKED_DATES.filter(d => solvedSet.has(d)).length;
            const unsolvedCount = TRACKED_DATES.length - solvedCount;

            document.getElementById('summary').innerHTML = `
    <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span> ${solvedCount} solved</span>
    <span class="flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-red-500 inline-block"></span> ${unsolvedCount} unsolved</span>
  `;

            let rows = TRACKED_DATES;
            if (filterMode === 'solved') rows = rows.filter(d => solvedSet.has(d));
            if (filterMode === 'unsolved') rows = rows.filter(d => !solvedSet.has(d));
            if (monthFilter !== 'all') rows = rows.filter(d => d.slice(0, 7) === monthFilter);
            if (topicFilter !== 'all') rows = rows.filter(d => topicFor(d) === topicFilter);

            document.getElementById('rows').innerHTML = rows.map(d => {
                const isSolved = solvedSet.has(d);
                const topic = topicFor(d);
                return `<tr class="border-b border-gray-100">
      <td class="py-1.5 pr-4 font-mono">${d}</td>
      <td class="py-1.5 pr-4 text-gray-600">${TOPIC_LABELS[topic] || topic}</td>
      <td class="py-1.5">
        <span class="inline-block px-2 py-0.5 rounded text-xs font-medium ${isSolved ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
          ${isSolved ? 'Solved' : 'Unsolved'}
        </span>
      </td>
    </tr>`;
            }).join('');
        }

        document.getElementById('filter').addEventListener('change', (e) => {
            filterMode = e.target.value;
            render();
        });
        document.getElementById('month-filter').addEventListener('change', (e) => {
            monthFilter = e.target.value;
            render();
        });
        document.getElementById('topic-filter').addEventListener('change', (e) => {
            topicFilter = e.target.value;
            render();
        });

        loadData();
    </script>
