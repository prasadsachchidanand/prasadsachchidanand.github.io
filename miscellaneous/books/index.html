    <style>
        /* ---------------------------------------------------------------
           Design tokens — "The Working Notebook"
           A quiet, paper-and-ink identity for a page of worked textbook
           problems: cool paper (not the usual AI cream), chalkboard-blue
           chrome, a rust accent used sparingly, and exercise numbers that
           read like coordinates (§2.3.14) because that's exactly what they
           are in these books.
        ----------------------------------------------------------------*/
        :root {
            --paper: #F3F4F0;
            --paper-deep: #EAECE6;
            --rule: #DBDED5;
            --ink: #171B1E;
            --ink-soft: #4B5652;
            --chalk: #2C5A73;
            --chalk-dark: #1E4054;
            --rust: #A84B27;
            --card: #FFFFFF;
        }

        body {
            background-color: var(--paper);
            /* Subtle radial depth instead of a literal grid — reads as
               quality paper stock rather than graph paper, and won't
               compete with content or look "AI-generated-template" at
               a glance. */
            background-image:
                radial-gradient(ellipse 900px 500px at 15% -10%, rgba(44, 90, 115, 0.07), transparent 60%),
                radial-gradient(ellipse 900px 600px at 100% 0%, rgba(168, 75, 39, 0.05), transparent 55%);
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* Typography for the notebook theme lives here, scoped to the
           content area only — NOT on body — so the shared nav/footer keep
           using the site's actual font instead of inheriting this one. */
        #app {
            font-family: 'IBM Plex Sans', ui-sans-serif, system-ui, sans-serif;
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            color: var(--ink);
        }

        .font-display {
            font-family: 'Spectral', ui-serif, Georgia, serif;
        }

        .font-mono,
        .coord,
        .mono-label {
            font-family: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace;
        }

        ::selection {
            background: var(--chalk);
            color: #fff;
        }

        a:focus-visible,
        button:focus-visible {
            outline: 2px solid var(--chalk);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* ---------- shared "coordinate" tag: the signature element ----------
           Every chapter/section/problem number in the site is rendered as
           this small crosshair-marked mono tag, so a "2.3.14" always reads
           as an address, never as a stray number. */
        .coord {
            display: inline-flex;
            align-items: center;
            gap: .3em;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            line-height: 1;
            padding: .3em .55em;
            border-radius: 5px;
            border: 1px solid currentColor;
            white-space: nowrap;
        }

        .coord::before {
            content: "";
            width: 5px;
            height: 5px;
            border-radius: 1px;
            background: currentColor;
            transform: rotate(45deg);
            flex: none;
        }

        /* ---------- generic surfaces ---------- */
        .surface-card {
            background: var(--card);
            border: 1px solid var(--rule);
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
        }

        .surface-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px -12px rgba(32, 38, 43, 0.22);
            border-color: #cfd3c9;
        }

        .btn {
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            border-radius: 8px;
            padding: .5rem 1rem;
            transition: background-color .15s ease, color .15s ease, border-color .15s ease;
            border: 1px solid transparent;
        }

        .btn-hint {
            background: #FBF3E6;
            color: #8A5A16;
            border-color: #EFD9AE;
        }

        .btn-hint:hover {
            background: #F6E8CC;
        }

        .btn-solution {
            background: #EAF3EE;
            color: var(--chalk-dark);
            border-color: #C6DFD0;
        }

        .btn-solution:hover {
            background: #DCEDE2;
        }

        .reveal-box {
            border-left: 3px solid var(--chalk);
            background: #F4F8F6;
            border-radius: 0 10px 10px 0;
        }

        .reveal-box.is-hint {
            border-left-color: #C08A2E;
            background: #FBF6EC;
        }

        .difficulty-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        /* ---------- accordion chrome shared by the book view ---------- */
        .chapter-card {
            background: var(--card);
            border: 1px solid var(--rule);
        }

        .chapter-card summary,
        .chapter-toggle,
        .section-toggle {
            cursor: pointer;
        }

        .problem-row {
            transition: background-color .15s ease, border-color .15s ease, padding-left .15s ease;
        }

        .problem-row:hover {
            padding-left: 0.35rem;
        }

        /* Defensive backup: Tailwind's CSS reset forces every <svg> to
           display:block, which can break inline math (MathJax's SVG output
           wraps each formula in an <svg>) onto its own line. The main site's
           stylesheet already handles this for daily-problem pages; this is
           just a local backup in case this page's DOM structure differs. */
        mjx-container:not([display="true"]) {
            display: inline-block;
        }

        mjx-container[display="true"] {
            display: block;
            margin: 1em 0;
        }
    </style>
